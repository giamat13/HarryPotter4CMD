name: Build

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pycaw comtypes

      - name: Build
        run: build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HP
          path: dist/HP.exe
